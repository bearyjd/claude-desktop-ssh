name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need full tag history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: ver
        run: |
          LAST_TAG=$(git tag --list 'v*' | sort -V | tail -1)
          CURRENT="${LAST_TAG#v}"
          CURRENT="${CURRENT:-0.0.0}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          VERSION_CODE=$((MAJOR*10000 + MINOR*100 + PATCH))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.ver.outputs.version }}"/' Cargo.toml

      - name: Update mobile/app.json
        run: |
          python3 - mobile/app.json "${{ steps.ver.outputs.version }}" "${{ steps.ver.outputs.version_code }}" <<'PY'
          import sys, json
          path, version, version_code = sys.argv[1], sys.argv[2], int(sys.argv[3])
          with open(path) as f:
              data = json.load(f)
          data["expo"]["version"] = version
          data["expo"].setdefault("android", {})["versionCode"] = version_code
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml mobile/app.json
          git commit -m "chore: release ${{ steps.ver.outputs.tag }}"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "navette ${{ steps.ver.outputs.tag }}" \
            --generate-notes
