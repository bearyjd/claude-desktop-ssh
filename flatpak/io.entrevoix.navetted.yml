app-id: io.entrevoix.navetted
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: navetted
finish-args:
  - --share=network
  - --share=ipc
  - --filesystem=home
  - --env=RUST_LOG=info
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/navetted/.cargo-home
modules:
  - name: navetted
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/navetted/.cargo-home
        RUST_BACKTRACE: '1'
    build-commands:
      - mkdir -p .cargo-home
      - |
        printf '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "vendor/"\n' > .cargo-home/config.toml
      - cargo build --release --offline --frozen
      - install -Dm755 target/release/navetted /app/bin/navetted
      - install -Dm755 target/release/navetted-hook /app/bin/navetted-hook
      - install -Dm644 flatpak/io.entrevoix.navetted.metainfo.xml /app/share/metainfo/io.entrevoix.navetted.metainfo.xml
    sources:
      - type: dir
        path: ..
        skip:
          - target/
          - .git/
